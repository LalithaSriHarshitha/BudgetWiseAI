{% load static %}
<aside class="sidebar">
    <div class="sidebar-header">
        <h2>💰 BudgetWise</h2>
        <p class="sidebar-subtitle">AI Expense Forecasting</p>
    </div>
    
    <nav class="sidebar-nav">
        <a href="{% url 'expenses:dashboard' %}" class="nav-item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            <span class="nav-icon">📊</span>
            <span>Dashboard</span>
        </a>
        <a href="{% url 'expenses:add_expense' %}" class="nav-item {% if request.resolver_match.url_name == 'add_expense' %}active{% endif %}">
            <span class="nav-icon">➕</span>
            <span>Add Expense</span>
        </a>
        <a href="{% url 'expenses:list_expenses' %}" class="nav-item {% if request.resolver_match.url_name == 'list_expenses' %}active{% endif %}">
            <span class="nav-icon">📋</span>
            <span>All Expenses</span>
        </a>
        <a href="{% url 'expenses:analytics' %}" class="nav-item {% if request.resolver_match.url_name == 'analytics' %}active{% endif %}">
            <span class="nav-icon">📈</span>
            <span>Analytics</span>
        </a>
        <a href="{% url 'ai_engine:ai_dashboard' %}" class="nav-item {% if request.resolver_match.url_name == 'ai_dashboard' %}active{% endif %}">
            <span class="nav-icon">🤖</span>
            <span>AI Insights</span>
        </a>
    </nav>
    
    <div class="sidebar-footer">
        <div class="user-info">
            <div class="user-avatar">{{ user.username|slice:":1"|upper }}</div>
            <div class="user-details">
                <div class="user-name">{{ user.username }}</div>
                <div class="user-email">{{ user.email }}</div>
            </div>
        </div>
        <a href="{% url 'accounts:logout' %}" class="btn-logout-sidebar">
            <span>🚪</span> Logout
        </a>
    </div>
</aside>
